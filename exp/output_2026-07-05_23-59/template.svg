  <g id="AF09">
    <rect x="4455" y="2060" width="200" height="250" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="4555" y="2185" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36">&lt;AF&gt;09</text>
  </g>
  <text x="4555" y="2400" class="box-text-small">Ultrasound</text>
  <text x="4555" y="2470" class="box-text-small">(5)</text>

  <rect x="4750" y="2020" width="350" height="590" class="light-blue-box" />
  <g id="AF17">
    <rect x="4825" y="2060" width="200" height="250" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="4925" y="2185" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36">&lt;AF&gt;17</text>
  </g>
  <text x="4925" y="2400" class="box-text-small">Heart MRI</text>
  <text x="4925" y="2470" class="box-text-small">(10)</text>

  <rect x="5120" y="2020" width="350" height="590" class="light-blue-box" />
  <g id="AF04">
