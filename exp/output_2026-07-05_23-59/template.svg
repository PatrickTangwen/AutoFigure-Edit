<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5632 3072" width="5632" height="3072">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="16" markerHeight="16" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="16" markerHeight="16" orient="auto-start-reverse">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="black" />
    </marker>

    <!-- Colors -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa" />
      <stop offset="100%" stop-color="#e9ecef" />
    </linearGradient>

    <!-- Styles -->
    <style>
      .title { font-family: Arial, sans-serif; font-weight: bold; font-size: 72px; fill: black; text-anchor: middle; }
      .section-title { font-family: Arial, sans-serif; font-weight: bold; font-size: 64px; fill: black; text-anchor: middle; }
      .box-text { font-family: Arial, sans-serif; font-size: 52px; fill: white; text-anchor: middle; }
      .box-text-small { font-family: Arial, sans-serif; font-size: 44px; fill: white; text-anchor: middle; }
      .box-text-black { font-family: Arial, sans-serif; font-size: 52px; fill: black; }
      .caption { font-family: Arial, sans-serif; font-size: 40px; fill: black; }
      
      .panel-bg { fill: #eef2f7; stroke: #c0c8d4; stroke-width: 6; rx: 80; ry: 80; }
      .dark-blue-box { fill: #2b4c73; rx: 30; ry: 30; }
      .light-blue-box { fill: #659bc8; rx: 30; ry: 30; }
      .red-box { fill: #dc5b41; rx: 20; ry: 20; }
      .grey-box { fill: #8c8c8c; rx: 20; ry: 20; }
      
      .dashed-border-red { fill: none; stroke: #dc5b41; stroke-width: 8; stroke-dasharray: 30, 20; rx: 60; ry: 60; }
      .dashed-border-blue { fill: none; stroke: #2b4c73; stroke-width: 8; stroke-dasharray: 30, 20; rx: 60; ry: 60; }
      
      .arrow-line { stroke: black; stroke-width: 16; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="5632" height="3072" fill="white" />

  <!-- Main Title -->
  <text x="2816" y="100" class="title">Data filtering process</text>

