  <g id="AF22">
    <rect x="4535" y="480" width="250" height="200" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="4660" y="580" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36">&lt;AF&gt;22</text>
  </g>
  <text x="4660" y="780" class="box-text">Base (19)</text>

  <rect x="4950" y="450" width="500" height="420" class="light-blue-box" />
  <g id="AF24">
    <rect x="5075" y="480" width="250" height="200" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="5200" y="580" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36">&lt;AF&gt;24</text>
  </g>
