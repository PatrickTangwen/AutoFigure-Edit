  <ellipse cx="3910" cy="1150" rx="210" ry="40" fill="#2b4c73" stroke="white" stroke-width="4" />
  <path d="M 3700 1150 A 210 40 0 0 0 4120 1150" fill="none" stroke="white" stroke-width="4" />
  <text x="3910" y="1380" class="box-text">Datafields</text>
  <text x="3910" y="1460" class="box-text">(366)</text>

