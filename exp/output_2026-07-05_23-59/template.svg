  <rect x="1500" y="1680" width="900" height="180" class="dark-blue-box" />
  <g id="AF11">
    <rect x="1550" y="1720" width="150" height="100" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="1625" y="1770" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="28">&lt;AF&gt;11</text>
