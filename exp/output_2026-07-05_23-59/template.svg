    <text x="5295" y="2185" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36">&lt;AF&gt;04</text>
  </g>
  <text x="5295" y="2400" class="box-text-small">Brain MRI</text>
  <text x="5295" y="2470" class="box-text-small">(34)</text>

  <!-- ==================== Arrows ==================== -->
  <!-- GWAS to Initial GWAS exclusion -->
  <line x1="1070" y1="950" x2="1420" y2="950" class="arrow-line" marker-end="url(#arrow)" />
  
  <!-- MRI to PCA -->
  <line x1="1070" y1="2050" x2="1350" y2="2050" class="arrow-line" />
  <line x1="1350" y1="2050" x2="1350" y2="2500" class="arrow-line" />
  <line x1="1350" y1="2500" x2="1470" y2="2500" class="arrow-line" marker-end="url(#arrow)" />

  <!-- Initial GWAS exclusion to Datafields -->
  <line x1="2450" y1="1360" x2="2580" y2="1360" class="arrow-line" marker-end="url(#arrow)" />
  
  <!-- Remain to PCA -->
  <line x1="3130" y1="2220" x2="3130" y2="2320" class="arrow-line" marker-end="url(#arrow)" />
  
  <!-- Remain dashed box to Datafields -->
  <line x1="3570" y1="1360" x2="3670" y2="1360" class="arrow-line" marker-end="url(#arrow)" />

  <!-- Datafields to Outcome Top -->
  <line x1="4120" y1="1360" x2="4310" y2="1360" class="arrow-line" marker-end="url(#arrow)" />

  <!-- PCA to Outcome Bottom -->
  <line x1="4060" y1="2500" x2="4310" y2="2500" class="arrow-line" marker-end="url(#arrow)" />

  <!-- ==================== Footer Caption ==================== -->
  <text x="50" y="2920" class="caption">Starting from 7228 GWAS phenotypes, the pipeline removes disease-related, temporally misaligned, complex, low-participation, family-history, and irrelevant variables, then groups the</text>
  <text x="50" y="2980" class="caption">retained fields into six predictor categories. Heart MRI, Brain MRI, and Ultrasound structural data are imputed and summarized by PCA before entering the imaging outcome group.</text>
</svg>