  <rect x="4410" y="910" width="500" height="420" class="light-blue-box" />
  <g id="AF21">
    <rect x="4535" y="940" width="250" height="200" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="4660" y="1040" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36">&lt;AF&gt;21</text>
  </g>
  <text x="4660" y="1200" class="box-text-small">Measurement</text>
