  <g id="AF23">
    <rect x="1550" y="1060" width="150" height="100" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="1625" y="1110" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="28">&lt;AF&gt;23</text>
  </g>
  <text x="2000" y="1130" class="box-text">Operation (237)</text>

  <rect x="1500" y="1240" width="900" height="180" class="red-box" />
  <g id="AF07">
    <rect x="1550" y="1280" width="150" height="100" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="1625" y="1330" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="28">&lt;AF&gt;07</text>
  </g>
  <text x="2000" y="1310" class="box-text">Health-related</text>
  <text x="2000" y="1380" class="box-text">outcomes (1538)</text>

  <rect x="1500" y="1460" width="900" height="180" class="red-box" />
  <g id="AF08">
    <rect x="1550" y="1500" width="150" height="100" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="1625" y="1550" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="28">&lt;AF&gt;08</text>
  </g>
