  <rect x="4950" y="910" width="500" height="420" class="light-blue-box" />
  <g id="AF27">
    <rect x="5075" y="940" width="250" height="200" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="5200" y="1040" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36">&lt;AF&gt;27</text>
  </g>
  <text x="5200" y="1200" class="box-text-small">Environment</text>
  <text x="5200" y="1270" class="box-text-small">(31)</text>

  <rect x="4410" y="1370" width="500" height="420" class="light-blue-box" />
  <g id="AF26">
    <rect x="4535" y="1400" width="250" height="200" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="4660" y="1500" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36">&lt;AF&gt;26</text>
  </g>
  <text x="4660" y="1660" class="box-text-small">Environment</text>
  <text x="4660" y="1730" class="box-text-small">(31)</text>

  <rect x="4950" y="1370" width="500" height="420" class="light-blue-box" />
  <g id="AF05">
    <rect x="5075" y="1400" width="250" height="200" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="5200" y="1500" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36">&lt;AF&gt;05</text>
  </g>
  <text x="5200" y="1660" class="box-text-small">Genetic</text>
