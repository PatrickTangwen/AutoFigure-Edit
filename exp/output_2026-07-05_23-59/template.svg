  <rect x="50" y="180" width="1150" height="2550" class="panel-bg" />
  <text x="625" y="300" class="section-title">Data Source</text>

  <!-- GWAS Box -->
  <rect x="180" y="580" width="890" height="740" class="dark-blue-box" />
  <g id="AF18">
    <rect x="500" y="650" width="250" height="300" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="625" y="800" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36">&lt;AF&gt;18</text>
  </g>
  <text x="625" y="1080" class="box-text">GWAS</text>
  <text x="625" y="1160" class="box-text">(7228 Phenotypes)</text>

  <!-- MRI Box -->
  <rect x="180" y="1620" width="890" height="1000" class="dark-blue-box" />
  
  <g id="AF06">
    <rect x="370" y="1700" width="180" height="220" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="460" y="1810" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="32">&lt;AF&gt;06</text>
  </g>
  <g id="AF15">
    <rect x="670" y="1700" width="180" height="220" fill="#808080" stroke="black" stroke-width="2"/>
    <text x="760" y="1810" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="32">&lt;AF&gt;15</text>
