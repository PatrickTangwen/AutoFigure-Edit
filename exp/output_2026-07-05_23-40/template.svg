  <text x="940" y="1250" font-size="80" text-anchor="middle" fill="black">critical attributes missing]</text>

  <!-- Step 2 Text -->
  <text x="3450" y="900" font-size="70" font-weight="bold" fill="black">C2_2</text>
  <text x="2825" y="1000" font-size="90" font-weight="bold" text-anchor="middle" fill="black">Step 2: EHR Alignment &amp;</text>
