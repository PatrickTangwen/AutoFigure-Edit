  <text x="3950" y="1550" font-size="70" fill="black">Filter Pipeline Complete</text>
  
  <text x="3600" y="1870" font-size="70" fill="black">Disease</text>
  <text x="3600" y="1950" font-size="70" fill="black">Annotation</text>
