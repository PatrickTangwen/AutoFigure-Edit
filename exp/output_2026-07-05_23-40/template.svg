  <text x="30" y="1960" font-size="100" font-weight="bold" fill="black">FINAL ANALYTICAL COHORT</text>
  <text x="30" y="2070" font-size="100" font-weight="bold" fill="black">&amp; LABEL VERIFICATION</text>

  <!-- STAGE 4 Text -->
  <text x="230" y="2980" font-size="100" font-weight="bold" fill="black">STAGE 4: MODELING-READY DATA PARTITIONING MATRIX</text>

  <!-- UK Biobank Text -->
  <text x="970" y="180" font-size="70" font-weight="bold" fill="black">C1_1</text>
