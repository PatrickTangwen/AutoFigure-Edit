  <!-- Step 3 Text -->
  <text x="5440" y="900" font-size="70" font-weight="bold" fill="black">C2_3</text>
  <text x="4775" y="1000" font-size="90" font-weight="bold" text-anchor="middle" fill="black">Step 3: Prevalence</text>
  <text x="4775" y="1100" font-size="90" font-weight="bold" text-anchor="middle" fill="black">Thresholding</text>
  <text x="4775" y="1220" font-size="80" text-anchor="middle" fill="black">[Drop Phecodes with</text>
  <text x="4775" y="1320" font-size="80" text-anchor="middle" fill="black">&lt;100 positive cases]</text>

  <!-- Final Analytical Cohort Text -->
  <text x="2230" y="1730" font-size="70" font-weight="bold" fill="black">C3_1</text>
  <text x="2835" y="1950" font-size="90" font-weight="bold" text-anchor="middle" fill="black">Final Analytical Cohort</text>
